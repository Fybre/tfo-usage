{% extends "base.html" %}
{% block content %}
<h1>Tenant search</h1>
<form method="get" action="/tenants" class="filter-row">
    <input type="text" class="form-control" style="max-width: 320px;" name="q" value="{{ q }}"
        placeholder="Search tenant name or customer id" />
    <button type="submit" class="btn btn-primary">Search</button>
</form>

{% if q and not results %}
<p>No matches.</p>
{% endif %}

{% if results %}
<table class="table table-sm table-hover">
    <thead>
        <tr>
            <th>Tenant</th>
            <th>Customer</th>
            <th>Customer ID</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for t in results %}
        <tr>
            <td>{{ t.tenant_name }}</td>
            <td>{{ t.customer_name }}</td>
            <td>{{ t.customer_id }}</td>
            <td><a class="btn btn-sm btn-primary" href="/tenants/{{ t.customer_id }}">View</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}
{% endblock %}
