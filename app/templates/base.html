<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "TFO Usage" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">TFO Usage</a>
            <div class="d-flex">
                <a class="btn btn-outline-light btn-sm me-2" href="/">Home</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/upload">Upload</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/tenants">Tenants</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/tenants/expiry">Expiry</a>
                <a class="btn btn-outline-light btn-sm" href="/backup">Backup</a>
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</body>

</html>
